<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic AI Voice Calculator</title>
    <style>
        :root {
            --bg-color: #0a0b10;
            --panel-bg: rgba(16, 18, 27, 0.7);
            --accent-cyan: #00f0ff;
            --accent-purple: #bd00ff;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --glow: 0 0 15px rgba(0, 240, 255, 0.4);
            --error-glow: 0 0 15px rgba(255, 0, 99, 0.4);
            --accent-error: #ff0063;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background-color: var(--bg-color); color: var(--text-main);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background-image: radial-gradient(circle at 20% 30%, rgba(189, 0, 255, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(0, 240, 255, 0.15) 0%, transparent 40%);
        }

        .calculator-container {
            width: 100%; max-width: 480px; padding: 24px; background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 24px;
            backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); position: relative;
        }

        .calculator-container::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-purple), transparent);
            border-radius: 24px 24px 0 0;
        }

        header { text-align: center; margin-bottom: 24px; }
        header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; text-shadow: var(--glow); }
        header p { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .display-panel { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 16px; padding: 20px; margin-bottom: 24px; position: relative; }
        
        .status-badge { position: absolute; top: 12px; right: 12px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 2px 8px; border-radius: 4px; background: rgba(255, 255, 255, 0.05); color: var(--text-muted); transition: all 0.3s ease; }
        .status-badge.listening { color: var(--accent-cyan); box-shadow: var(--glow); background: rgba(0, 240, 255, 0.1); }
        .status-badge.processing { color: var(--accent-purple); background: rgba(189, 0, 255, 0.1); }

        .voice-input-feedback { min-height: 40px; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; font-style: italic; border-bottom: 1px solid rgba(255, 255, 255, 0.05); padding-bottom: 8px; }
        .voice-input-feedback span { color: var(--accent-cyan); font-style: normal; }
        
        .math-expression { 
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid transparent;
            font-size: 1.2rem; 
            color: var(--text-muted); 
            text-align: right; 
            padding: 4px 0;
            font-family: 'Courier New', monospace; 
            outline: none;
            transition: all 0.3s ease;
        }
        
        .math-expression:focus {
            color: var(--text-main);
            border-bottom: 1px solid var(--accent-cyan);
            box-shadow: 0 4px 10px -4px rgba(0, 240, 255, 0.4);
        }
        
        .result-display { font-size: 2.5rem; font-weight: 700; text-align: right; min-height: 50px; margin-top: 8px; font-family: 'Courier New', monospace; transition: all 0.2s ease; }
        .result-display.success { color: var(--accent-cyan); text-shadow: var(--glow); }
        .result-display.error { color: var(--accent-error); text-shadow: var(--error-glow); font-size: 1.5rem; }

        .controls { display: flex; flex-direction: column; gap: 16px; align-items: center; }
        
        .mic-btn { width: 80px; height: 80px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple)); cursor: pointer; position: relative; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3); transition: all 0.3s; }
        .mic-btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(0, 240, 255, 0.6); }
        .mic-btn svg { width: 32px; height: 32px; fill: #fff; }
        .mic-btn.active { animation: pulse 1.5s infinite linear; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 240, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 240, 255, 0); } }

        .btn-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); }
        
        .utility-row { display: flex; gap: 12px; margin-top: 10px; }
        .action-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: var(--text-muted); padding: 8px 16px; font-size: 0.75rem; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-weight: bold;}
        .action-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--text-main); }
    </style>
</head>
<body>

    <div class="calculator-container" id="calcContainer">
        <header>
            <h1>AI Voice Calculator</h1>
            <p>Quantum Audio Logic Engine</p>
        </header>

        <div class="display-panel">
            <div class="status-badge" id="statusBadge">Idle</div>
            <div class="voice-input-feedback" id="voiceFeedback">Press microphone and speak...</div>
            
            <input type="text" class="math-expression" id="mathExpression" placeholder="Expression..." autocomplete="off">
            
            <div class="result-display" id="resultDisplay">0</div>
        </div>

        <div class="controls">
            <button class="mic-btn" id="micBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M12,2A3,3 0 0,1 15,5V11A3,3 0 0,1 12,14A3,3 0 0,1 9,11V5A3,3 0 0,1 12,2M19,11C19,14.53 16.39,17.44 13,17.93V21H11V17.93C7.61,17.44 5,14.53 5,11H7A5,5 0 0,0 12,16A5,5 0 0,0 17,11H19Z" />
                </svg>
            </button>
            <div class="btn-label" id="micLabel">Tap to Speak</div>
            
            <div class="utility-row">
                <button class="action-btn" id="voiceToggleBtn" style="color: #10b981; border-color: #10b981;">🔊 Echo: ON</button>
                <button class="action-btn" id="clearBtn">Clear System</button>
            </div>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const micLabel = document.getElementById('micLabel');
        const statusBadge = document.getElementById('statusBadge');
        const voiceFeedback = document.getElementById('voiceFeedback');
        const mathExpression = document.getElementById('mathExpression');
        const resultDisplay = document.getElementById('resultDisplay');
        const calcContainer = document.getElementById('calcContainer');
        const clearBtn = document.getElementById('clearBtn');
        const voiceToggleBtn = document.getElementById('voiceToggleBtn');

        let isListening = false;
        let recognition = null;
        let echoInputEnabled = true; 

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';

            recognition.onstart = () => {
                isListening = true;
                setUIState('listening', 'Listening...', 'Awaiting dynamic speech input...');
            };

            recognition.onend = () => {
                isListening = false;
                if(statusBadge.textContent === 'Listening...') {
                    setUIState('idle', 'Idle', 'System closed processing sequence.');
                }
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                processVoiceInput(transcript);
            };
        } else {
            alert("Your browser does not support the Web Speech API. Please use Google Chrome or Microsoft Edge.");
        }

        voiceToggleBtn.addEventListener('click', () => {
            echoInputEnabled = !echoInputEnabled;
            if (echoInputEnabled) {
                voiceToggleBtn.innerHTML = '🔊 Echo: ON';
                voiceToggleBtn.style.color = '#10b981'; 
                voiceToggleBtn.style.borderColor = '#10b981';
            } else {
                voiceToggleBtn.innerHTML = '🔇 Echo: OFF';
                voiceToggleBtn.style.color = '#ef4444'; 
                voiceToggleBtn.style.borderColor = '#ef4444';
            }
        });

        micBtn.addEventListener('click', () => {
            if (!recognition) return;
            if (isListening) recognition.stop();
            else { clearDisplay(); recognition.start(); }
        });

        clearBtn.addEventListener('click', clearDisplay);

        mathExpression.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const manualInput = mathExpression.value;
                if (manualInput.trim() !== '') {
                    voiceFeedback.innerHTML = `Manual override activated.`;
                    // Manual inputs are also safely routed through the math parser now!
                    const parsedManualString = parseSpeechToMath(manualInput);
                    mathExpression.value = parsedManualString;
                    executeCalculation(parsedManualString);
                }
            }
        });

        function setUIState(state, badgeText, feedbackText) {
            statusBadge.textContent = badgeText;
            statusBadge.className = 'status-badge';
            micBtn.classList.remove('active');

            if (state === 'listening') {
                statusBadge.classList.add('listening');
                micBtn.classList.add('active');
                micLabel.textContent = "Listening...";
                voiceFeedback.innerHTML = feedbackText;
            } else if (state === 'processing') {
                statusBadge.classList.add('processing');
                micLabel.textContent = "Processing Backend...";
                voiceFeedback.innerHTML = feedbackText;
            } else if (state === 'idle') {
                micLabel.textContent = "Tap to Speak";
            }
        }

        function parseSpeechToMath(text) {
            // 1. Lowercase and globally strip ALL standard conversational punctuation instantly
            let normalized = text.toLowerCase().replace(/[.,?!;:_]/g, ' ').trim();
            
            // 2. The Complete Master Dictionary (Synced with Python Backend)
            const replacements = [
                // Basic Arithmetic
                { words: [/minus/g, /subtract/g, /take away/g], syntax: '-' },
                { words: [/plus/g, /add/g], syntax: '+' },
                { words: [/multiplied by/g, /multiply by/g, /times/g, /x/g], syntax: '*' },
                { words: [/divided by/g, /divide by/g, /over/g], syntax: '/' },
                
                // Advanced Math (Roots & Powers)
                { words: [/square root of ([0-9.]+)/g, /square root ([0-9.]+)/g, /root ([0-9.]+)/g, /rute ([0-9.]+)/g, /sqrt ([0-9.]+)/g], syntax: 'sqrt($1)' },
                { words: [/to the power of ([0-9.]+)/g, /power ([0-9.]+)/g, /raised to ([0-9.]+)/g], syntax: '**$1' },
                { words: [/squared/g], syntax: '**2' },
                { words: [/cubed/g], syntax: '**3' },
                
                // Special Functions
                { words: [/percent of ([0-9.]+)/g, /% of ([0-9.]+)/g], syntax: '/100*$1' },
                { words: [/factorial of ([0-9.]+)/g, /([0-9.]+) factorial/g, /factorial ([0-9.]+)/g], syntax: 'factorial($1)' },
                { words: [/absolute value of ([0-9.]+)/g, /absolute ([0-9.]+)/g, /abs ([0-9.]+)/g], syntax: 'abs($1)' },
                
                // Rounding & Logs (NEW)
                { words: [/round up ([0-9.]+)/g, /ceiling ([0-9.]+)/g, /ceil ([0-9.]+)/g], syntax: 'ceil($1)' },
                { words: [/round down ([0-9.]+)/g, /floor ([0-9.]+)/g], syntax: 'floor($1)' },
                { words: [/natural log of ([0-9.]+)/g, /log base e of ([0-9.]+)/g], syntax: 'log($1)' },
                { words: [/log base 10 of ([0-9.]+)/g, /log 10 of ([0-9.]+)/g, /log ([0-9.]+)/g], syntax: 'log10($1)' },
                
                // Trigonometry
                { words: [/sine of ([0-9.]+)/g, /sin ([0-9.]+)/g], syntax: 'sin(radians($1))' },
                { words: [/cosine of ([0-9.]+)/g, /cos ([0-9.]+)/g], syntax: 'cos(radians($1))' },
                { words: [/tangent of ([0-9.]+)/g, /tan ([0-9.]+)/g], syntax: 'tan(radians($1))' },
                
                // Constants
                { words: [/pi/g], syntax: 'pi' },
                { words: [/\be\b/g], syntax: 'e' } // \b ensures it only catches the letter 'e' when it's a standalone word
            ];

            // Apply all dictionary translations
            replacements.forEach(item => {
                item.words.forEach(regex => { normalized = normalized.replace(regex, item.syntax); });
            });
            
            // 3. The Strict Whitelist Bouncer
            // Destroys all conversational words (like "calculate", "what", "is") but explicitly spares our math commands.
            normalized = normalized.replace(/[a-z]+/g, (match) => {
                const allowedMathWords = [
                    'sqrt', 'factorial', 'abs', 'sin', 'cos', 'tan', 
                    'radians', 'pi', 'e', 'ceil', 'floor', 'log', 'log10'
                ];
                return allowedMathWords.includes(match) ? match : '';
            });

            // 4. The Final Vacuum
            // Strips any leftover weird characters, preserving ONLY numbers, math symbols, and surviving whitelisted letters.
            return normalized.replace(/[^0-9+\-*/().\sa-z]/g, '').trim();
        }
        
        function speakOutput(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1;
            utterance.pitch = 0.9;
            synth.speak(utterance);
        }

        function processVoiceInput(rawText) {
            setUIState('processing', 'Processing', `Captured: "<span>${rawText}</span>"`);
            const mathString = parseSpeechToMath(rawText);
            
            mathExpression.value = mathString;

            if (echoInputEnabled) {
                speakOutput(`You said: ${rawText}`);
            }

            executeCalculation(mathString);
        }

        async function executeCalculation(mathString) {
            try {
                const response = await fetch('/api/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ expression: mathString })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    resultDisplay.textContent = data.result;
                    resultDisplay.className = 'result-display success';
                    statusBadge.textContent = "Success";
                    statusBadge.className = 'status-badge listening';
                    
                    setTimeout(() => {
                        speakOutput(`The answer is ${data.spoken_text}`);
                    }, echoInputEnabled ? 1500 : 0); 
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                resultDisplay.textContent = err.message || "Server Error";
                resultDisplay.className = 'result-display error';
                statusBadge.textContent = "Error";
                speakOutput("Error processing calculation.");
            }
        }

        function clearDisplay() {
            voiceFeedback.innerHTML = "Press microphone and speak...";
            mathExpression.value = "";
            resultDisplay.textContent = "0";
            resultDisplay.className = 'result-display';
            setUIState('idle', 'Idle', 'Press microphone and speak...');
        }
    </script>
</body>
</html>
